<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyBuddy - 背单词神器</title>
    <style>
        /* --- 这里是 CSS 样式部分 --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #333;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h1 { color: #4a90e2; margin-bottom: 1.5rem; }
        .word-card {
            font-size: 2.5rem;
            font-weight: bold;
            margin: 1rem 0;
            color: #2c3e50;
        }
        input[type="text"] {
            width: 80%;
            padding: 12px;
            font-size: 1rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            margin-bottom: 1rem;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus {
            border-color: #4a90e2;
            outline: none;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 1rem;
        }
        button {
            padding: 10px 20px;
            font-size: 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }
        button:active { transform: scale(0.98); }
        .btn-check { background-color: #4CAF50; color: white; }
        .btn-speak { background-color: #2196F3; color: white; }
        .btn-next { background-color: #FF9800; color: white; }
        
        .feedback {
            font-weight: bold;
            min-height: 1.5rem;
            margin-top: 10px;
        }
        .hint {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #666;
            display: none; /* 默认隐藏 */
            background: #fff3cd;
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>📚 背单词挑战</h1>
        
        <!-- 单词显示区域 -->
        <div class="word-card" id="current-word">Loading...</div>
        
        <!-- 输入框 -->
        <input type="text" id="user-answer" placeholder="输入中文意思...">
        
        <!-- 按钮组 -->
        <div class="btn-group">
            <button class="btn-check" onclick="validateAnswer()">✅ 提交</button>
            <button class="btn-speak" onclick="speakText(currentWordData.en)">🔊 发音</button>
        </div>
        <button class="btn-next" onclick="nextWord()">➡️ 下一个</button>

        <!-- 反馈信息 -->
        <div class="feedback" id="feedback-msg"></div>
        
        <!-- 提示区域 -->
        <div class="hint" id="hint-area"></div>
    </div>

    <script>
        // --- 这里是你的 JavaScript 逻辑 (已整合并适配) ---

        // 1. 单词数据
        const words = [
            { en: "Apple", cn: "苹果" },
            { en: "Banana", cn: "香蕉" },
            { en: "Orange", cn: "橙子" },
            { en: "Computer", cn: "电脑" },
            { en: "Book", cn: "书" },
            { en: "Water", cn: "水" },
            { en: "Friend", cn: "朋友" },
            { en: "School", cn: "学校" }
        ];

        let currentWordData = words[0];
        let currentIndex = 0;

        // 2. 初始化页面
        function initGame() {
            loadWord(currentIndex);
        }

        function loadWord(index) {
            currentWordData = words[index];
            document.getElementById('current-word').textContent = currentWordData.en;
            document.getElementById('user-answer').value = '';
            document.getElementById('feedback-msg').textContent = '';
            document.getElementById('hint-area').style.display = 'none';
            document.getElementById('user-answer').focus();
        }

        // 3. 验证答案 (适配你的 HTML 结构)
        function validateAnswer() {
            const inputVal = document.getElementById('user-answer').value.trim().toLowerCase();
            const feedbackEl = document.getElementById('feedback-msg');
            
            if (!inputVal) {
                feedbackEl.textContent = "⚠️ 请输入答案！";
                feedbackEl.style.color = "#e67e22";
                return;
            }

            if (inputVal === currentWordData.cn.toLowerCase()) {
                feedbackEl.textContent = "✅ 正确！太棒了！";
                feedbackEl.style.color = "#27ae60";
                // 答对后自动播放发音（可选）
                // speakText(currentWordData.en); 
            } else {
                feedbackEl.textContent = `❌ 错误。正确答案是：${currentWordData.cn}`;
                feedbackEl.style.color = "#c0392b";
                // 显示提示
                const hintEl = document.getElementById('hint-area');
                hintEl.textContent = `💡 提示：首字母是 ${currentWordData.en.charAt(0)}...`;
                hintEl.style.display = 'block';
            }
        }

        // 4. 下一个单词
        function nextWord() {
            currentIndex = (currentIndex + 1) % words.length;
            loadWord(currentIndex);
        }

        // 5. 语音功能 (来自你上传的文件，稍作适配)
        function speakText(text) {
            if (!('speechSynthesis' in window)) {
                alert('抱歉，您的浏览器不支持语音功能。');
                return;
            }
            
            // 取消之前的发音
            window.speechSynthesis.cancel();

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.9; // 语速稍慢一点更清晰

            utterance.onstart = () => console.log("🔊 开始发音:", text);
            utterance.onerror = (e) => {
                console.error("语音错误:", e);
                // 移动端有时需要用户交互才能发音，这里不做强制alert以免打扰
            };

            // 小延迟以确保在移动端可靠运行
            setTimeout(() => {
                window.speechSynthesis.speak(utterance);
            }, 100);
        }

        // 绑定回车键提交
        document.getElementById('user-answer').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                validateAnswer();
            }
        });

        // 启动游戏
        initGame();

    </script>
</body>
</html>
